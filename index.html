  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       

        /* основной контейнер */
        .story-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        /* заголовок секции */
        .snake-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .snake-header h2 {
               font-family: 'Playfair Display', serif;
                font-size: 1.8rem;
                color: #85634d;
                /* text-shadow: 2px 0.0001px 0 #5a3a28; */
                letter-spacing: 2px;
        }
        .snake-header p {
                color: #7b543b;
            font-size: 0.9rem;
            margin-top: 8px;
            border-top: 2px dotted #c9a87b;
            display: inline-block;
            padding-top: 8px;
        }

        /* ========== ЗМЕЙКА-ГАЛЕРЕЯ (MOBILE SNAKE) ========== */
        .snake-gallery {
            display: flex;
            flex-direction: column;
            gap: 35px;
            position: relative;
            padding: 10px 0 30px 0;
        }

        /* извилистая линия-след (как тело змейки) */
        .snake-gallery::before {
            content: '';
            position: absolute;
            left: 18%;
            top: 20px;
            width: 4px;
            height: calc(100% - 40px);
            background: linear-gradient(180deg, 
                #e6b87e, #c98f54, #b57a42, #e6b87e);
            border-radius: 4px;
            box-shadow: 0 0 6px rgba(255,200,120,0.6);
            z-index: 0;
            animation: snakePulse 2s infinite;
        }

        @keyframes snakePulse {
            0%, 100% { opacity: 0.7; transform: scaleX(1);}
            50% { opacity: 1; transform: scaleX(1.2); background: #ffcf8a;}
        }

        /* каждый элемент — змейка то влево, то вправо */
        .snake-item {
            display: flex;
            width: 100%;
            position: relative;
            animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .snake-item.left {
            justify-content: flex-start;
        }
        .snake-item.right {
            justify-content: flex-end;
        }

        /* задержки для плавного появления */
        .snake-item:nth-child(1) { animation-delay: 0.05s; opacity: 0; animation-fill-mode: forwards; }
        .snake-item:nth-child(2) { animation-delay: 0.15s; opacity: 0; animation-fill-mode: forwards; }
        .snake-item:nth-child(3) { animation-delay: 0.25s; opacity: 0; animation-fill-mode: forwards; }
        .snake-item:nth-child(4) { animation-delay: 0.35s; opacity: 0; animation-fill-mode: forwards; }
        .snake-item:nth-child(5) { animation-delay: 0.45s; opacity: 0; animation-fill-mode: forwards; }
        .snake-item:nth-child(6) { animation-delay: 0.55s; opacity: 0; animation-fill-mode: forwards; }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* стиль фото-рамки */
        .photo-card {
            width: 82%;
            background: #fffaf2;
            border-radius: 32px;
            padding: 14px 14px 12px 14px;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4), 0 0 0 1px #fae2c6 inset, 0 0 0 3px #fff9f0 inset;
            transition: all 0.35s ease;
            backdrop-filter: blur(2px);
            transform-origin: center;
        }

        .snake-item.left .photo-card {
            border-bottom-left-radius: 16px;
            transform: rotate(-0.5deg);
        }
        .snake-item.right .photo-card {
            border-bottom-right-radius: 16px;
                transform: rotate(5.5deg);
        }

        .photo-card:hover {
            transform: scale(1.02) translateY(-4px);
            box-shadow: 0 28px 35px -14px rgba(0,0,0,0.5);
        }

        .photo-card img {
            width: 100%;
            height: auto;
            border-radius: 24px;
            display: block;
            object-fit: cover;
            aspect-ratio: 4 / 4;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .photo-card img:active {
            transform: scale(0.98);
        }

        .caption {
            font-family: 'Segoe UI', system-ui;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
            margin-top: 12px;
            color: #8b5a3c;
            background: #fff6ec;
            padding: 8px 12px;
            border-radius: 60px;
            display: inline-block;
            width: 100%;
            letter-spacing: 0.3px;
            box-shadow: inset 0 1px 2px #ffeee0, 0 1px 2px rgba(0,0,0,0.05);
        }

        /* декоративные элементы на "голову" змейки */
        .snake-gallery::after {
            content: "🐍✨";
            position: absolute;
            bottom: -20px;
            right: 5%;
            font-size: 2.2rem;
            opacity: 0.7;
            filter: drop-shadow(2px 4px 6px #221a12);
            pointer-events: none;
        }

        /* ========== ФИНИШНЫЙ ЭКРАН ========== */
        .finish-screen {
            background: linear-gradient(135deg, #fff5e8, #ffefdf);
            border-radius: 64px 64px 56px 56px;
            padding: 36px 24px 44px;
            margin-top: 40px;
            text-align: center;
            box-shadow: 0 35px 45px -20px rgba(0,0,0,0.5), 0 0 0 4px #fbe5cf inset, 0 0 0 8px #ffffffba inset;
            border: 1px solid #eccaac;
            animation: glowFinish 0.8s ease;
        }

        @keyframes glowFinish {
            0% { opacity: 0; transform: scale(0.96); box-shadow: 0 0 0 0 #ffd8b5; }
            100% { opacity: 1; transform: scale(1); box-shadow: 0 35px 45px -20px black; }
        }

        .finish-icon {
            font-size: 4rem;
            filter: drop-shadow(2px 6px 12px rgba(160, 100, 40, 0.3));
            margin-bottom: 10px;
        }

        .finish-screen h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #b45f2b;
            margin: 10px 0;
        }

        .finish-message {
            background: #fff5ea;
            border-radius: 48px;
            padding: 28px 20px;
            margin: 25px 0;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4f2f1c;
            font-weight: 500;
            border: 2px dashed #e2bc8c;
        }

        .location-box {
            background: #e7cdb0;
            border-radius: 60px;
            padding: 18px;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: bold;
            color: #2c1a0e;
            margin: 20px 0;
            display: inline-block;
            width: 90%;
        }

        .final-button {
            background: #c2854b;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 0 #6e3c1a;
            cursor: pointer;
            transition: 0.07s linear;
            margin-top: 15px;
            width: 80%;
        }

        .final-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #6e3c1a;
        }

        .footer-note {
            font-size: 0.75rem;
            margin-top: 20px;
            color: #ad7a54;
        }

        /* кнопка прокрутки наверх и легенда */
        .scroll-hint {
            text-align: center;
            font-size: 0.7rem;
            margin: 10px 0;
            color: #efd5b5;
        }

        @media (max-width: 550px) {
            .photo-card {
                width: 88%;
                padding: 10px;
            }
            .snake-gallery::before {
                left: 12%;
            }
            .snake-header h2 {
                font-size: 1.5rem;
            }
        }

        /* анимация появления фоток при скролле (доп. бонус) */
        @keyframes wiggle {
            0%,100%{ transform: translateX(0px);}
            25%{ transform: translateX(3px);}
            75%{ transform: translateX(-3px);}
        }
        .photo-card:active img {
            animation: wiggle 0.2s ease;
        }

        <style>
.heart-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeInOverlay 0.5s ease;
    cursor: pointer;
}

@keyframes fadeInOverlay {
    from { opacity: 0; backdrop-filter: blur(0px); }
    to { opacity: 1; backdrop-filter: blur(8px); }
}

.giant-heart {
    font-size: 180px;
    animation: heartBeat 0.8s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(255,80,80,0.8));
    cursor: pointer;
    transition: transform 0.2s;
}

.giant-heart:active {
    transform: scale(0.95);
}

@keyframes heartBeat {
    0%, 100% { transform: scale(1); text-shadow: 0 0 20px #ff3366; }
    50% { transform: scale(1.2); text-shadow: 0 0 50px #ff6699; }
}

.heart-explode {
    animation: explodeOut 0.4s forwards;
}

@keyframes explodeOut {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
}

.floating-heart {
    position: fixed;
    pointer-events: none;

function addFinalCoordinatesToMap() {
    if (!myMap) {
        console.log('Карта не инициализирована');
        return;
    }
    
    // Финальные координаты (вокзал, платформа №147)
    const finalCoords = [59.929948, 30.362246];
    const secretCoords = [59.95325676833709, 30.327058042000267];
    
    // Удаляем старые метки, если есть
    if (window.finalMarker) myMap.geoObjects.remove(window.finalMarker);
    if (window.secretMarker) myMap.geoObjects.remove(window.secretMarker);
    if (window.finalRoute) myMap.geoObjects.remove(window.finalRoute);
    
    // Добавляем финальную метку (вокзал)
    window.finalMarker = new ymaps.Placemark(finalCoords, {
        balloonContent: '<b>🎯 ФИНИШ!</b><br>Камера хранения №147<br>Московский вокзал<br><br>✨ Здесь тебя ждёт сюрприз! ✨'
    }, {
        preset: 'islands#violetIcon',
        iconColor: '#9b59b6'
    });
    myMap.geoObjects.add(window.finalMarker);
    
    // Добавляем маршрут от последней точки квеста до вокзала
    if (currentPointIndex < points.length && points[currentPointIndex]) {
        const lastPoint = points[currentPointIndex];
        let lastCoords;
        if (typeof lastPoint.coordinates === 'string') {
            const parts = lastPoint.coordinates.split(',').map(c => parseFloat(c.trim()));
            lastCoords = [parts[0], parts[1]];
        } else {
            lastCoords = lastPoint.coordinates;
        }
        
        window.finalRoute = new ymaps.Polyline([lastCoords, finalCoords], {}, {
            strokeColor: "#d4a574",
            strokeWidth: 4,
            strokeOpacity: 0.9,
            strokeStyle: 'solid'
        });
        myMap.geoObjects.add(window.finalRoute);
    }
    
    // Центрируем карту на вокзале
    myMap.panTo(finalCoords, { flying: true, duration: 800 });
    setTimeout(() => {
        if (typeof addFinalCoordinatesToMap === 'function') {
            addFinalCoordinatesToMap();
        }
    }, 500);
    
    console.log('Финальные координаты добавлены на карту');

}

// Функция для добавления секретной точки (вызывается после открытия замка)
function addSecretPointToMap() {
    if (!myMap) return;
    
    const secretCoords = [59.95325676833709, 30.327058042000267];
    
    // Удаляем старую секретную метку, если есть
    if (window.secretMarker) myMap.geoObjects.remove(window.secretMarker);
    if (window.secretRoute) myMap.geoObjects.remove(window.secretRoute);
    
    // Добавляем секретную метку
    window.secretMarker = new ymaps.Placemark(secretCoords, {
        balloonContent: '<b>🎁 СЕКРЕТНЫЙ ПОДАРОК!</b><br>❤️ Твой сюрприз ждёт здесь! ❤️<br><br>✨ Я тебя люблю! ✨'
    }, {
        preset: 'islands#pinkIcon',
        iconColor: '#ff69b4'
    });
    myMap.geoObjects.add(window.secretMarker);
    
    // Добавляем маршрут от вокзала до секретной точки
    const finalCoords = [59.929948, 30.362246];
    window.secretRoute = new ymaps.Polyline([finalCoords, secretCoords], {}, {
        strokeColor: "#ff99cc",
        strokeWidth: 4,
        strokeOpacity: 0.8,
        strokeStyle: 'dash'
    });

        }
        
        ymaps.ready(function() {
            const mapElement = document.getElementById('yandexMap');
            if (!mapElement) {
                console.log('Элемент карты не найден');
                return;
            }
            
            console.log('Яндекс.Карты загружены, создаем карту...');
            
            // Создаем карту
            myMap = new ymaps.Map("yandexMap", {
                center: [59.9343, 30.3292],
                zoom: 12,
                controls: ['zoomControl', 'fullscreenControl']
            });
            
            // Добавляем стартовую точку (только на карте, не в квесте)
            const startMarker = new ymaps.Placemark([60.068434, 30.314928], {
                balloonContent: '<b>🏁 ТОЧКА СТАРТА</b><br>Архитектора Белова 9<br><br>✨ Здесь начинается твоё приключение! ✨'
            }, {
                preset: 'islands#greenIcon',
                iconColor: '#2e7d32'
            });
            myMap.geoObjects.add(startMarker);
            
            console.log('Карта создана, стартовая точка добавлена');
            
            // Обновляем маркеры
            updateMapForPoint();
        });
    }
    
    function updateMapForPoint() {
        if (!myMap) {
            console.log('Карта не инициализирована');
            return;
        }
        if (typeof points === 'undefined') {
            console.log('Массив points не найден');
            return;
        }
        
        console.log('Обновляем маркеры, текущая точка:', currentPointIndex);
        
        // Очищаем старые маркеры (кроме стартовой точки)
        mapMarkers.forEach(m => myMap.geoObjects.remove(m));
        mapMarkers = [];
        if (mapRoute) myMap.geoObjects.remove(mapRoute);
        if (airplaneMarker) myMap.geoObjects.remove(airplaneMarker);
        
        // Добавляем все пройденные точки из квеста
        for (let i = 0; i <= currentPointIndex && i < points.length; i++) {
            const pt = points[i];
            let coords;
            if (typeof pt.coordinates === 'string') {
                const parts = pt.coordinates.split(',').map(c => parseFloat(c.trim()));
                coords = [parts[0], parts[1]];
            } else {
                coords = pt.coordinates;
            }
            
            const isCurrent = (i === currentPointIndex);
            
            const marker = new ymaps.Placemark(coords, {
                balloonContent: `<b>${isCurrent ? '📍 ТЕКУЩАЯ ТОЧКА' : '✓ ПРОЙДЕНО'}</b><br>${pt.riddle.substring(0, 150)}...`
            }, {
                preset: isCurrent ? 'islands#brownIcon' : 'islands#greenIcon'
            });
            myMap.geoObjects.add(marker);
            mapMarkers.push(marker);
        }
        
        // Самолётик на текущей точке
        if (currentPointIndex < points.length) {
            let currentCoords;
            const currentPt = points[currentPointIndex];
            if (typeof currentPt.coordinates === 'string') {
                const parts = currentPt.coordinates.split(',').map(c => parseFloat(c.trim()));
                currentCoords = [parts[0], parts[1]];
            } else {
                currentCoords = currentPt.coordinates;
            }
            
            airplaneMarker = new ymaps.Placemark(currentCoords, {
                balloonContent: '✈️ ВЫ ЗДЕСЬ!'
            }, {
                preset: 'islands#airplaneIcon',
                iconColor: '#d4a574'
            });
            myMap.geoObjects.add(airplaneMarker);
        }
        
        // Линия маршрута
        if (currentPointIndex > 0) {
            const routeCoords = [];
            for (let i = 0; i <= currentPointIndex; i++) {
                let coords;
                if (typeof points[i].coordinates === 'string') {
                    const parts = points[i].coordinates.split(',').map(c => parseFloat(c.trim()));
                    coords = [parts[0], parts[1]];
                } else {
                    coords = points[i].coordinates;
                }
                routeCoords.push(coords);
            }
            mapRoute = new ymaps.Polyline(routeCoords, {}, {
                strokeColor: "#d4a574",
                strokeWidth: 4,
                strokeOpacity: 0.9
            });
            myMap.geoObjects.add(mapRoute);
        }
        
        // Центрируем на текущей точке
        if (currentPointIndex < points.length) {
            let targetCoords;
            const targetPt = points[currentPointIndex];
            if (typeof targetPt.coordinates === 'string') {
                const parts = targetPt.coordinates.split(',').map(c => parseFloat(c.trim()));
                targetCoords = [parts[0], parts[1]];
            } else {
                targetCoords = targetPt.coordinates;
            }
            myMap.panTo(targetCoords, { flying: true, duration: 800 });
        }
    }
    
    // Управление картой
    const mapContainer = document.getElementById('mapContainer');
    const openMapBtn = document.getElementById('openMapBtn');
    const closeMapBtn = document.getElementById('closeMapBtn');
    
    if (openMapBtn) {
        openMapBtn.onclick = () => {
            if (mapContainer) {
                mapContainer.classList.remove('hidden-map');
                setTimeout(() => {
                    if (myMap) {
                        myMap.container.fitToViewport();
                    } else {
                        initMap();
                    }
                }, 100);
            }
        };
    }
    
    if (closeMapBtn) {
        closeMapBtn.onclick = () => {
            if (mapContainer) mapContainer.classList.add('hidden-map');
        };
    }
    
    // Запускаем карту после загрузки страницы
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM загружен, инициализируем карту...');
        initMap();
    });
    
    // Обновляем карту при рендере (для вызова из основного кода)
    window.updateMapForPoint = updateMapForPoint;
</script>
</body>
</html>
