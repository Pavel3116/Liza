<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>День рождение - парижский маршрут!</title>
    <link rel="icon" href="images/favicon.jpg" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap');

        @font-face {
    font-family: 'Parisienne';
    src: url('fonts/Parisienne-ymRq.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url("images/Parish.jpg");
          
            font-family: 'Montserrat', sans-serif;
            background-repeat: no-repeat;
            background-position: center;
            background-size:cover;
            /* background: #f0e4d3; */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            /* color: #3e3530; */
            /* background-image: 
                radial-gradient(circle at 10% 30%, #ffd7ba 0%, transparent 35%),
                radial-gradient(circle at 90% 70%, #ffe1c6 0%, transparent 40%),
                repeating-linear-gradient(45deg, #ecdacb 0px, #ecdacb 2px, transparent 2px, transparent 20px); */
        }

        .container {
            opacity: 0.958;
            max-width: 600px;
            width: 100%;
            background: #fff9f2;
            border-radius: 48px 48px 48px 48px;
            padding: 42px 32px;
            box-shadow: 0 30px 50px -20px #b8a28e, 0 0 0 3px #fadbc8 inset, 0 0 0 8px #fff5e9 inset;
            border: 1px solid #e3c9b5;
            position: relative;
            background-image: linear-gradient(165deg, #fffbf5 0%, #ffefe2 100%);
        }

        /* Праздничный декор */
        .container::before {
            content: "🎂 🎉";
            position: absolute;
            top: -20px;
            left: 30px;
            font-size: 2.2rem;
            opacity: 0.8;
            transform: rotate(-2deg);
            filter: drop-shadow(0 6px 6px #cfb6a2);
            white-space: nowrap;
        }

        .container::after {
            content: "";
            position: absolute;
            bottom: 15px;
            right: 20px;
            width: 150px;
            height: 70px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 70" opacity="0.1"><path d="M30,35 Q50,15 70,35 T110,35 T140,35" stroke="%23b28b70" fill="none" stroke-width="3"/><circle cx="45" cy="30" r="4" fill="%23b28b70"/><circle cx="85" cy="40" r="4" fill="%23b28b70"/><circle cx="125" cy="30" r="4" fill="%23b28b70"/><text x="10" y="60" font-family="Montserrat" font-size="16" fill="%23b28b70">joyeux anniversaire</text></svg>');
            background-size: cover;
            pointer-events: none;
        }

        h1 {
            /* font-family: 'Playfair Display', serif; */
            font-size: 2.2rem;
            color: #9d6b4b;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-bottom: 3px solid #fadbc8;
            padding-bottom: 22px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #ffefe2;
            font-style: normal;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: #b07c5a;
            margin: 20px 0 15px;
            border-left: 6px solid #fadbc8;
            padding-left: 20px;
            font-style: normal;
        }

        .badge {
            display: inline-block;
            background: #fadbc8;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7b543b;
            border: 2px solid #fff5e9;
            box-shadow: 0 3px 0 #d6aa8c;
            margin-bottom: 15px;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .coordinates-block {
            background: #fff3e9;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'Montserrat', monospace;
            font-size: 1.1rem;
            text-align: center;
            border: 2px solid #fadbc8;
            color: #7b543b;
            box-shadow: 0 6px 0 #e3c9b5, inset 0 2px 10px #fff9f2;
            position: relative;
            background-image: linear-gradient(145deg, #fff7ef, #ffe7d8);
        }

        .coordinates-block::before {
            content: "📍";
            position: absolute;
            left: -12px;
            top: -15px;
            font-size: 1.8rem;
            filter: drop-shadow(2px 3px 0 #d6aa8c);
            background: #fff9f2;
            padding: 3px 8px;
            border-radius: 50%;
            border: 2px solid #fadbc8;
        }

        .riddle-block {
            background: #fff9f2;
            border-radius: 30px;
            padding: 26px;
            margin: 25px 0;
            border: 2px dashed #fadbc8;
            font-style: italic;
            font-size: 1.1rem;
            color: #7b543b;
            box-shadow: inset 0 0 0 5px #fffcf7, 0 6px 0 #e3c9b5;
            font-family: 'Playfair Display', serif;
            line-height: 1.7;
        }

        .photo-frame {
            width: 100%;
            /* aspect-ratio: 4/3; */
            background: #fadbc8;
            border-radius: 30px 30px 30px 30px;
            margin: 25px 0;
            overflow: hidden;
            border: 6px solid #fff9f2;
            box-shadow: 0 15px 25px -10px #b28b70, 0 0 0 2px #fadbc8;
            background-image: repeating-linear-gradient(45deg, #ffe7d8 0px, #ffe7d8 6px, #fff3e9 6px, #fff3e9 12px);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #ffe7d8;
            color: #b07c5a;
            font-size: 4rem;
            font-family: 'Playfair Display', serif;
        }

        /* Стили для видео */
        .video-container {
            width: 100%;
            margin: 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff3e9;
            border-radius: 30px;
            padding: 15px;
            border: 2px solid #fadbc8;
            box-shadow: 0 6px 0 #e3c9b5;
        }

        .memory-video {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
        }

        .message-text {
            background: #fff9f2;
            padding: 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #5b4032;
            border: 2px solid #fadbc8;
            margin: 25px 0;
            white-space: pre-line;
            box-shadow: 0 6px 0 #e3c9b5, inset 0 0 25px #fffcf7;
            position: relative;
            font-family: 'Playfair Display', serif;
        }

        .message-text::after {
            content: "🎂";
            position: absolute;
            bottom: -12px;
            right: -12px;
            font-size: 1.8rem;
            opacity: 0.6;
            transform: rotate(5deg);
            filter: drop-shadow(2px 3px 0 #d6aa8c);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
        }

        input {
            background: #fffcf7;
            border: 2px solid #fadbc8;
            padding: 18px 26px;
            border-radius: 60px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.2s;
            color: #5b4032;
            box-shadow: inset 0 4px 8px #ffe7d8, 0 5px 0 #e3c9b5;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
        }

        input:focus {
            border-color: #d6aa8c;
            box-shadow: inset 0 4px 8px #ffe7d8, 0 5px 0 #c99774;
            background: #ffffff;
        }

        button {
            background: #fadbc8;
            border: none;
            padding: 18px 26px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #7b543b;
            border: 2px solid #fff9f2;
            box-shadow: 0 6px 0 #d6aa8c;
            cursor: pointer;
            transition: 0.05s linear;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            background-image: linear-gradient(145deg, #ffe7d8, #fadbc8);
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d6aa8c;
        }

        .hidden {
            display: none;
        }

        .error-message {
            color: #c45d2c;
            font-size: 0.95rem;
            text-align: center;
            background: #fff0e5;
            padding: 10px 20px;
            border-radius: 40px;
            border: 2px solid #e6936e;
            font-family: 'Montserrat', sans-serif;
        }

        .question-block {
            background: #fff9f2;
            border-radius: 40px;
            padding: 32px;
            margin: 20px 0;
            border: 2px solid #fadbc8;
            box-shadow: 0 8px 0 #e3c9b5;
            position: relative;
            background-image: linear-gradient(135deg, #fffcf7, #ffefe2);
        }

        .question-block::before {
            content: "❓";
            position: absolute;
            left: -18px;
            top: -18px;
            font-size: 2.2rem;
            background: #fff9f2;
            padding: 5px 15px;
            border-radius: 50%;
            border: 2px solid #fadbc8;
            box-shadow: 3px 3px 0 #d6aa8c;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #b28b70;
            border-top: 3px dotted #fadbc8;
            padding-top: 22px;
            font-family: 'Montserrat', sans-serif;
        }

        .point {
            animation: fadeParis 0.5s ease;
        }

        @keyframes fadeParis {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .final-paris {
            background: #fff9f2;
            border-radius: 48px;
            padding: 35px;
            margin: 20px 0;
            border: 2px solid #fadbc8;
            box-shadow: 12px 12px 0 #e3c9b5;
            background-image: linear-gradient(145deg, #fffbf5, #ffeade);
            border: 2px solid #ffe7d8;
        }

        .paris-emoji {
            font-size: 2.2rem;
            filter: drop-shadow(0 6px 6px #cfb6a2);
            text-align: center;
            margin: 20px 0;
            letter-spacing: 10px;
        }

        .birthday-message {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: #b07c5a;
            text-align: center;
            margin: 15px 0;
            font-style: italic;
        }
       
h1, h2, .birthday-message {
    font-family: 'Parisienne';
}
.Key{
    display: flex;
    min-width: 200px;
    justify-content: space-evenly;
    align-items: stretch;
}

 .coordinates-block, .riddle-block, .cor {
        cursor: pointer; /* чтобы было видно, что кликабельно */
        padding: 20px;
        margin: 10px;
        border: 2px solid #ff6b6b;
        border-radius: 15px;
        background: #fff0f0;
        transition: opacity 0.3s;
    }
    .hidden {
        display: none; /* класс для скрытия */
    }
    .highlight {
    background: #ffeaa7;  /* нежный жёлтый */
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 500;
}
.memory-image {
        cursor: pointer;
        max-width: 200px;
        border-radius: 20px;
        transition: transform 0.2s;
    }
    .memory-image:hover {
        transform: scale(1.02);
    }
    .hidden-text {
        display: none;
        background: #fff9e6;
        padding: 20px;
        border-radius: 20px;
        margin-top: 15px;
        font-family: 'Courier New', monospace;
        border-left: 5px solid #ff9f7c;
        max-width: 300px;
    }
    .show {
        display: block;
    }
    .coordinates-block.show {
    display: block !important;
}
   .cor.show {
    display: block !important;
}
.riddle-block.show {
    display: block !important;
}

.coordinates-block.hidden,
.riddle-block.hidden,
.cor.hidden {
    display: none !important;
}
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- СТАРТ: ввод ключа из утренней записки -->
        <div id="splashScreen">
            <h1>Парижский маршрут 🥐</h1>
            <h2>Ты готова к путишествию?</h2>

            <div class="birthday-message">с днём рождения, любимая</div>
            <div class="paris-emoji">🎂</div>
            <div style="background: #fff9f2; border-radius: 40px; padding: 32px 20px; margin: 25px 0; border: 2px solid #fadbc8; box-shadow: 0 8px 0 #e3c9b5;">
               <div class="Key">

                   <p style="margin-bottom: 25px; font-size: 1.2rem; color: #7b543b; font-family: 'Playfair Display', serif;">введи ключ из утренней записки</p>
                   <img src="images/key.png" style="max-width: 50px;">
               </div>
                <div class="input-group">
                    <input type="text" id="globalKey" placeholder="код">
                    <button onclick="enterGlobalKey()">✨ начать путешествие</button>
                </div>
                <div class="error-message" id="globalError"></div>
            </div>
            <div class="footer">День Рождения! · петербург · 31 марта 2026</div>
             <div class="footer" style="text-align: end;">P.S. Твоя Бубизьяна.</div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
        <div id="mainContainer" class="hidden"></div>
    </div>

    <script>
        // ============== ТВОИ ТОЧКИ И ВОПРОСЫ ==============
        const GLOBAL_KEY = '1'; // пока 1, потом заменишь

        // ТОЧКИ (5 штук)
        const points = [
             {
                 id: 1,
                coordinates: '60.036947, 30.324604', // Озерки прокат сноубордов
                riddle: 'Помнишь наше первое официальное свидание? Я позвал тебя в Охта Парк кататься на сноубордах. Но прежде чем покорить склоны, мы заехали в одно место...... <br> Туда, где пахло резиной и кофе, где ребята в подвальке подбирали нам доски и не только  "мы первый раз, ладно я(".<br> Ты несколько раз мерила ботинки — всё никак не могла подобрать удобные, а мы оба были такие радостные, словно уже неслись с горы, хотя ещё даже из проката не вышли 😄 Конверт с кодом — там! <br> <br> И знаешь, что я запомнил больше всего? Твою улыбку. Она меня очень радовала. С самого первого дня и до сих пор. <br><br><span class="highlight">Кодовое слово: [Агент 007 пришел получать задание] </span><br><br> P.S. Если вдруг захочешь в кино — вспомни «Мираж», но код не там. Наше кино только начинается 🎬',
                placeKey: '1',
                photo: 'images/Сноуборды2.jpg',
                text: 'Мы так и не стали профи, но это был лучший день. <br> Мы уехали на целый день в Охта Парк, и ты учила меня кататься. Падали, смеялись, снова вставали и радовались как дети. Эмоций было — вагон, и всё самые настоящие. <br> А ещё устроили офигенную фотосессию прямо на склоне. До сих пор те фото — мои любимые.<br> Ты смеялась, я любовался. И пусть сноуборд нас так и не покорил — тот вечер остался в сердце навсегда.'
            },
            { 
                id: 2,
                coordinates: '59.966936, 30.242207', // Крестовский пляж
                riddle: 'Помнишь тот день на пляже? Ты была в моей команде, а я кричал своему брату: «Вам хана, щас бомбёжка будет!» И мы реально их сделали, наверное, хахаха. А потом, после игры, пошли к метро и болтали обо всём — о катке, о твоих связках на голени, о чём-то ещё… Я запомнил тот вечер навсегда. Код — где-то там, на пляже, возле песка и той сетки, где мы играли. Найди',
                placeKey: '1',
                photo: 'images/beach.jpg',
                text: 'А ты не промах, поздравляю с первой победой! Так держать, ты умница. Классный был день, когда мы впервые увиделись! Ты пришла с братом, а потом мы болтали до самого метро. Ты тогда показалась мне очень интересной девушкой. И раз ты так классно стартанула — погнали дальше! Путишествие только начинается!'
            },
           
            { 
                id: 3,
                coordinates: '59.930390, 30.289907', // Новая Голландия
                riddle: 'Красная арка, лёд и вальс. С обратной стороны таблички конверт.',
                placeKey: '1',
                photo: 'images/my_collag.jpg',
                text: 'Мы так и не научились кататься, но это был лучший вечер. Ты смеялась, мы падали, а потом танцевали вальс.'
            },
            { 
                id: 4,
                coordinates: '59.9440, 30.3066', // Стрелка В.О.
                riddle: 'Ростральные колонны. Загляни за скульптуру у подножия южной колонны.',
                placeKey: '1',
                photo: 'img/point3.jpg',
                text: 'Символ морской славы. Здесь мы мечтали о путешествиях.'
            },
            { 
                id: 5,
                coordinates: '59.9452, 30.3364', // Летний сад
                riddle: 'Памятник Крылову. Найди самую маленькую мышь на постаменте.',
                placeKey: '1',
                photo: 'img/point4.jpg',
                text: 'Мы смеялись над смешными мордами животных. Этот сад помнит наши прогулки.'
            },
            { 
                id: 6,
                coordinates: '59.9343, 30.3292', // Дом Зингера
                riddle: 'Встань лицом к Спасу-на-Крови. На набережной найди чугунную решётку. За ней конверт.',
                placeKey: '1',
                photo: 'img/point5.jpg',
                text: 'Здесь пахнет кофе и книгами. Ты любишь листать книги перед сном.'
            }
        ];

        // ВОПРОСЫ (появляются между точками)
        const questions = [
            {
                id: 'q1',
                question: 'День, когда мы познакомились? (в формате ДД.ММ.ГГГГ)',
                answer: '1',
                afterPoint: 1 // после первой точки
            },
            {
                id: 'q2',
                question: 'Дата, когда мы начали встречаться? (ДД.ММ.ГГГГ)',
                answer: '1',
                afterPoint: 2 // после второй точки
            },
            {
                id: 'q3',
                question: 'Дата, когда ты впервые познакомилась с моим братом? (он приехал, а мы были голые в кровати)',
                answer: '1',
                afterPoint: 3 // после третьей точки
            },
            {
                id: 'q4',
                question: 'Какой город для тебя дом?',
                answer: '1',
                afterPoint: 5, // после пятой точки
                isFinal: true   // после этого вопроса сразу финал
            }
        ];

        // ФИНАЛ (вокзал)
        const finalPoint = {
            message: '🎉 С ДНЁМ РОЖДЕНИЯ! 🎉\n\nТы собрала все коды. Теперь найди на вокзале камеру хранения №147. Код — сумма всех чисел, которые ты нашла.',
            hint: 'Псков → с Московского вокзала уходят поезда туда',
            finalText: 'Внутри ячейки паспорт и билет. Я жду тебя там, куда ведёт этот билет. Иди ко мне. ❤️'
        };

        // ============== СОСТОЯНИЕ ==============
        let currentPointIndex = 0;          // индекс в points (0-4)
        let pointRevealed = false;           // открыто ли воспоминание на текущей точке
        let globalUnlocked = false;

        const splash = document.getElementById('splashScreen');
        const mainContainer = document.getElementById('mainContainer');

        // ============== ФУНКЦИИ ==============
        window.enterGlobalKey = function() {
            const input = document.getElementById('globalKey')?.value.trim();
            const errorDiv = document.getElementById('globalError');
            if (input === GLOBAL_KEY) {
                splash.classList.add('hidden');
                mainContainer.classList.remove('hidden');
                globalUnlocked = true;
                currentPointIndex = 0;
                pointRevealed = false;
                renderCurrentPoint();
            } else {
                if (errorDiv) errorDiv.innerText = 'неверный ключ';
            }
        };

        function renderCurrentPoint() {
            if (!globalUnlocked) return;

            // Если все точки пройдены
            if (currentPointIndex >= points.length) {
                renderFinal();
                return;
            }

            const point = points[currentPointIndex];
            
            let html = `
                <div class="point" >
                    <div style="display: flex;
    flex-direction: column;">
                        <span class="badge">🗼 остановка ${currentPointIndex + 1}</span>
                        <img src="images/Конверт2.png" class="memory-image" id="clickImage" style="max-width=150px;">
                        </div>
                    <h2 id="coor" class="cor" style="display: none;" >📍 координаты</h2>
<div class="coordinates-block" id="secretMessage" style="display: none;">${point.coordinates}</div>

                    <div class="riddle-block" id="secretZadach" style="display:none;">🔍 ${point.riddle}</div>
            `;

            if (!pointRevealed) {
                html += `
                    <div class="input-group">
                        <input type="text" id="placeKey" placeholder="код с места">
                        <button onclick="revealMemory()">🔓 открыть</button>
                    </div>
                    <div class="error-message" id="placeKeyError"></div>
                `;
            } else {
                 if(currentPointIndex == 0){
                    html +=`
                    <div class="photo-frame" style="border-radius: 25px;">
                        <img src="images/Сноуборд.jpg" alt="фото" onerror="this.parentElement.innerHTML='<div class=\\'photo-placeholder\\'>📸</div>'">
                    </div>
                
`;
}
                html += `
                    <div class="photo-frame" style="border-radius: 25px;
    ">
                        <img src="${point.photo}" alt="фото" onerror="this.parentElement.innerHTML='<div class=\\'photo-placeholder\\'>📸</div>'">
                    </div>
                    
                    <div class="message-text">${point.text}</div>
                `;
               

                // Добавляем видео только для третьей точки
                if (currentPointIndex == 2) {
                    html += `
                        <div class="video-container">
                            <video class="memory-video vintage-video" controls preload="metadata" playsinline>
                                <source src="video/Video.mp4" type="video/mp4">
                                <source src="video/Video.webm" type="video/webm">
                                Ваш браузер не поддерживает видео. 
                                <a href="video/Video.mp4">Скачать видео</a>
                            </video>
                        </div>
                    `;
                }

                // Кнопка дальше
                html += `<button onclick="goToNext()" style="margin-top:15px;">✨ дальше</button>`;
            }

            html += `</div>`;
            mainContainer.innerHTML = html;
        }

        window.revealMemory = function() {
            const point = points[currentPointIndex];
            const input = document.getElementById('placeKey')?.value.trim();
            const errorDiv = document.getElementById('placeKeyError');

            if (input === point.placeKey) {
                pointRevealed = true;
                renderCurrentPoint();
            } else {
                if (errorDiv) errorDiv.innerText = 'неверный код';
            }
        };

        window.goToNext = function() {
            // Проверяем, есть ли вопрос ПОСЛЕ текущей точки
            const nextQuestion = questions.find(q => q.afterPoint === currentPointIndex + 1);
            
            if (nextQuestion) {
                // Если есть вопрос - показываем его
                showQuestion(nextQuestion);
            } else {
                // Если нет - просто на следующую точку
                currentPointIndex++;
                pointRevealed = false;
                renderCurrentPoint();
            }
        };

        function showQuestion(question) {
            let html = `
                <div class="point">
                    <span class="badge">❓ вопрос</span>
                    <div class="question-block">
                        <p style="font-size:1.2rem; margin-bottom:25px; font-family: 'Playfair Display', serif;">${question.question}</p>
                        <div class="input-group">
                            <input type="text" id="questionAnswer" placeholder="твой ответ">
                            <button onclick="checkQuestion('${question.answer}', ${question.isFinal})">✍️ ответить</button>
                        </div>
                        <div class="error-message" id="questionError"></div>
                    </div>
                </div>
            `;
            mainContainer.innerHTML = html;
        }

        window.checkQuestion = function(correctAnswer, isFinal) {
            const input = document.getElementById('questionAnswer')?.value.trim();
            const errorDiv = document.getElementById('questionError');

            if (input.toLowerCase() === correctAnswer.toLowerCase()) {
                if (isFinal) {
                    // После финального вопроса идём сразу на финал
                    renderFinal();
                } else {
                    // Иначе на следующую точку
                    currentPointIndex++;
                    pointRevealed = false;
                    renderCurrentPoint();
                }
            } else {
                if (errorDiv) errorDiv.innerText = 'неверный ответ';
            }
        };

        function renderFinal() {
            let html = `
                <div class="point">
                    <span class="badge">🏁 финиш</span>
                    <h2>вокзал</h2>
                    <div class="final-paris">
                        <div class="paris-emoji">🎂 🚂 🗼</div>
                        <div class="message-text" style="font-size:1.3rem;">
                            ${finalPoint.message}
                        </div>
                        <div style="background:#ffe7d8; border-radius:25px; padding:20px; margin:25px 0; border:2px dashed #fadbc8;">
                            <p style="font-style:italic; color:#7b543b;">✨ ${finalPoint.hint} ✨</p>
                        </div>
                        <div class="message-text">
                            ${finalPoint.finalText}
                        </div>
                        <div style="text-align:center; font-size:4rem; margin:30px 0;">❤️</div>
                    </div>
                </div>
            `;
            mainContainer.innerHTML = html;
        }

        // Enter на стартовом экране
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !splash.classList.contains('hidden')) {
                enterGlobalKey();
            }
        });
    </script>

                img.src = 'images/image.png'; // если нет - просто крутим обратно
            }
            img.style.transform = 'rotateY(0deg)';
        }, 300);
        
        // Показываем элементы с задержкой
        setTimeout(() => {
            if (coor) {
                coor.style.display = 'block';
                coor.style.animation = 'slideIn 0.5s';
            }
            
            if (coords) {
                coords.style.display = 'block';
                coords.style.animation = 'slideIn 0.7s';
            }
            
            if (zadach) {
                zadach.style.display = 'block';
                zadach.style.animation = 'slideIn 0.9s';
            }
        }, 600);
    }
    
    // Анимация для скрытия элементов
    if (e.target.id === 'coor' || e.target.id === 'secretMessage' || e.target.id === 'secretZadach') {
        e.target.style.animation = 'slideOut 0.3s';
        
        setTimeout(() => {

});
